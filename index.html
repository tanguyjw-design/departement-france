<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Départements français – Association</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f2;
    --surface: #ffffff;
    --border: #d4d0c8;
    --text: #2a2822;
    --muted: #7a7670;
    --accent: #3a6e5a;
    --accent-light: #e8f2ee;
    --correct: #c8e6c9;
    --correct-text: #1b5e20;
    --selected: #fff3cd;
    --selected-border: #e6a817;
    --error: #fdecea;
    --radius: 6px;
    --font: 'Segoe UI', system-ui, Arial, sans-serif;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ════════════════════════════
     PAGE D'ACCUEIL
  ════════════════════════════ */
  #accueil {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 40px;
    padding: 30px 20px;
    text-align: center;
  }
  #accueil .accueil-logo { font-size: 3rem; }
  #accueil h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }
  #accueil p {
    color: var(--muted);
    font-size: .95rem;
    max-width: 360px;
  }
  .mode-cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .mode-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 28px 30px;
    width: 220px;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .12s;
    text-align: center;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .mode-card:hover {
    border-color: var(--accent);
    box-shadow: 0 4px 18px rgba(58,110,90,.15);
    transform: translateY(-2px);
  }
  .mode-card .mode-icon { font-size: 2.2rem; }
  .mode-card .mode-title { font-size: 1.1rem; font-weight: 700; color: var(--text); }
  .mode-card .mode-desc  { font-size: .82rem; color: var(--muted); line-height: 1.4; }
  .mode-card .mode-record {
    font-size: .78rem;
    color: var(--accent);
    font-weight: 600;
    min-height: 18px;
  }
  .mode-card.ordre  { border-top: 4px solid #3a6e5a; }
  .mode-card.desordre { border-top: 4px solid #e6a817; }

  /* ════════════════════════════
     HEADER (jeu)
  ════════════════════════════ */
  #game-screen { display: none; }

  header {
    background: var(--accent);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  #home-btn {
    background: rgba(255,255,255,.18);
    border: none;
    color: #fff;
    border-radius: var(--radius);
    padding: 4px 10px;
    font-size: .8rem;
    cursor: pointer;
    font-weight: 600;
  }
  #home-btn:hover { background: rgba(255,255,255,.3); }
  header h1 { font-size: .95rem; font-weight: 600; letter-spacing: .02em; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  #mode-badge {
    background: rgba(255,255,255,.15);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .04em;
  }
  #progress-badge {
    background: rgba(255,255,255,.2);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: .85rem;
    white-space: nowrap;
  }

  /* ── Message bar ── */
  #message {
    text-align: center;
    font-size: .9rem;
    font-weight: 600;
    padding: 8px 16px;
    min-height: 36px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    transition: background .2s;
  }
  #message.ok  { background: var(--correct); color: var(--correct-text); }
  #message.err { background: var(--error);   color: #b71c1c; }

  /* ── Desktop layout ── */
  .desktop-layout {
    display: flex;
    gap: 20px;
    padding: 16px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }
  .panel {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .panel h2 {
    font-size: .8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .grid {
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    padding: 8px;
